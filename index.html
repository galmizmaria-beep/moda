<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MysticMinds — Редактор игры «Одень персонажа»</title>
<style>
  :root{
    --bg:#0e0f2a;
    --panel:#1a1b3a;
    --panel2:#22244d;
    --cyan:#4dd0e1;
    --purple:#a24bd8;
    --text:#dfe3ff;
    --glow:#7b5cff;
    --font:'Georgia', serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;background:linear-gradient(160deg,#0b0c22,#161738);
    color:var(--text);font-family:var(--font);min-height:100vh;
  }
  header{
    display:flex;justify-content:space-between;align-items:center;
    padding:14px 24px;background:rgba(20,22,55,.8);
    border-bottom:1px solid rgba(123,92,255,.3);
    text-shadow:0 0 8px var(--glow);
  }
  header h1{font-size:22px;margin:0;letter-spacing:3px;color:#cfd6ff;}
  .layout{display:flex;flex-wrap:wrap;gap:20px;padding:20px;}
  .editor,.preview{
    background:rgba(26,27,58,.7);border:1px solid rgba(123,92,255,.35);
    border-radius:14px;padding:18px;box-shadow:0 0 20px rgba(123,92,255,.25);
  }
  .editor{flex:1 1 340px;max-width:420px;}
  .preview{flex:2 1 480px;min-width:320px;}
  h2{color:var(--cyan);letter-spacing:2px;font-size:16px;text-shadow:0 0 6px var(--cyan);border-bottom:1px solid rgba(77,208,225,.3);padding-bottom:6px;}
  label{display:block;margin:10px 0 4px;font-size:13px;color:#b9c0ff;}
  input,select,textarea,button{
    width:100%;padding:8px;border-radius:8px;border:1px solid rgba(123,92,255,.4);
    background:rgba(14,15,42,.8);color:var(--text);font-family:var(--font);
  }
  input[type=color]{padding:2px;height:36px;}
  input[type=range]{padding:0;}
  button{
    cursor:pointer;background:linear-gradient(90deg,var(--purple),var(--cyan));
    color:#fff;border:none;font-weight:bold;letter-spacing:1px;
    text-shadow:0 0 4px #000;transition:.2s;margin-top:10px;
    box-shadow:0 0 10px var(--glow);
  }
  button:hover{filter:brightness(1.2);box-shadow:0 0 18px var(--glow);}
  .row{display:flex;gap:8px;}
  .row>*{flex:1;}
  fieldset{border:1px solid rgba(123,92,255,.3);border-radius:10px;margin-top:14px;}
  legend{color:var(--cyan);padding:0 6px;font-size:13px;}
  .clothItem{background:rgba(34,36,77,.7);border:1px solid rgba(123,92,255,.3);border-radius:8px;padding:8px;margin-top:8px;}
  .clothItem small{color:#8a90d0;}
  .gameStage{
    position:relative;width:100%;height:560px;border-radius:12px;overflow:hidden;
    background-position:center;background-size:cover;border:1px solid rgba(123,92,255,.3);
  }
  .drop-zone{
    position:absolute;border:2px dashed var(--cyan);border-radius:8px;
    box-shadow:0 0 10px var(--cyan);opacity:.8;
    display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;
  }
  .cloth-drag{position:absolute;cursor:grab;touch-action:none;user-select:none;filter:drop-shadow(0 0 6px var(--glow));}
  .taskModal,.winModal,.loseModal{
    position:absolute;inset:0;background:rgba(6,7,25,.85);display:none;
    align-items:center;justify-content:center;flex-direction:column;z-index:50;text-align:center;padding:20px;
  }
  .modalBox{
    background:var(--panel);border:1px solid var(--cyan);border-radius:14px;
    padding:24px;max-width:80%;box-shadow:0 0 25px var(--glow);
  }
  .ansBtn{margin:6px 0;}
  .tray{
    position:absolute;bottom:0;left:0;right:0;display:flex;gap:10px;flex-wrap:wrap;
    padding:8px;background:rgba(10,11,34,.7);justify-content:center;min-height:70px;align-items:center;
  }
  .tray img{height:56px;cursor:grab;filter:drop-shadow(0 0 6px var(--glow));}
  footer{text-align:center;padding:16px;font-size:12px;color:#8a90d0;border-top:1px solid rgba(123,92,255,.3);margin-top:20px;}
  .copied{background:linear-gradient(90deg,#2ecc71,#27ae60)!important;}
  .thumb{max-height:50px;border-radius:6px;margin-top:4px;}
  .tabs{display:flex;gap:6px;margin-bottom:10px;}
  .tabs button{margin-top:0;font-size:12px;padding:6px;}
</style>
</head>
<body>

<header>
  <h1>✦ MYSTICMINDS ✦ Редактор игры</h1>
  <div style="font-size:13px;color:var(--cyan)">«Одень персонажа»</div>
</header>

<div class="layout">

  <!-- ============ ПАНЕЛЬ РЕДАКТОРА ============ -->
  <div class="editor">
    <h2>НАСТРОЙКИ ИГРЫ</h2>

    <label>Заголовок игры</label>
    <input id="gameTitle" value="Одень персонажа" oninput="render()">

    <label>Язык интерфейса игры</label>
    <select id="lang" onchange="render()">
      <option value="ru">Русский</option>
      <option value="en">English</option>
      <option value="uk">Українська</option>
      <option value="de">Deutsch</option>
      <option value="fr">Français</option>
    </select>

    <fieldset>
      <legend>Изображения</legend>
      <label>Персонаж (в полный рост, одетый)</label>
      <input type="file" accept="image/*" onchange="loadImg(this,'character')">
      <img id="thumb_character" class="thumb">

      <label>Картинка ПОБЕДЫ</label>
      <input type="file" accept="image/*" onchange="loadImg(this,'win')">
      <img id="thumb_win" class="thumb">

      <label>Картинка ПОРАЖЕНИЯ</label>
      <input type="file" accept="image/*" onchange="loadImg(this,'lose')">
      <img id="thumb_lose" class="thumb">

      <label>Фон игры (необязательно)</label>
      <input type="file" accept="image/*" onchange="loadImg(this,'bg')">
      <img id="thumb_bg" class="thumb">
    </fieldset>

    <fieldset>
      <legend>Стиль</legend>
      <div class="row">
        <div><label>Фон</label><input type="color" id="c_bg" value="#0e0f2a" oninput="render()"></div>
        <div><label>Окно задания</label><input type="color" id="c_modal" value="#1a1b3a" oninput="render()"></div>
      </div>
      <div class="row">
        <div><label>Плашки ответов</label><input type="color" id="c_ans" value="#22244d" oninput="render()"></div>
        <div><label>Свечение кнопок</label><input type="color" id="c_glow" value="#7b5cff" oninput="render()"></div>
      </div>
      <div class="row">
        <div><label>Бирюзовый акцент</label><input type="color" id="c_cyan" value="#4dd0e1" oninput="render()"></div>
        <div><label>Фиолетовый акцент</label><input type="color" id="c_purple" value="#a24bd8" oninput="render()"></div>
      </div>
      <label>Шрифт</label>
      <select id="font" onchange="render()">
        <option value="Georgia, serif">Georgia</option>
        <option value="Arial, sans-serif">Arial</option>
        <option value="'Trebuchet MS', sans-serif">Trebuchet MS</option>
        <option value="'Courier New', monospace">Courier</option>
        <option value="Verdana, sans-serif">Verdana</option>
      </select>
      <label>Размер шрифта: <span id="fsVal">16</span>px</label>
      <input type="range" id="fontSize" min="12" max="26" value="16" oninput="fsVal.textContent=this.value;render()">
    </fieldset>

    <fieldset>
      <legend>Элементы одежды и задания</legend>
      <div id="clothList"></div>
      <button onclick="addCloth()">+ Добавить элемент одежды</button>
    </fieldset>

    <div class="tabs">
      <button onclick="openTest()">▶ ТЕСТ-ДРАЙВ</button>
      <button id="copyBtn" onclick="copyCode()">📋 Скопировать код</button>
    </div>
  </div>

  <!-- ============ ПРЕДПРОСМОТР ============ -->
  <div class="preview">
    <h2>ПРЕДПРОСМОТР (обновляется мгновенно)</h2>
    <iframe id="previewFrame" style="width:100%;height:620px;border:none;border-radius:12px;"></iframe>
  </div>

</div>

<footer>
  Все права защищены и принадлежат Гальмиз Марии Александровне
</footer>

<script>
/* ===================== ДАННЫЕ ===================== */
let clothes = []; // {id,name,img,zoneX,zoneY,zoneW,zoneH,startX,startY,taskType,question,answers[],correct,taskImg}
let images = {character:'',win:'',lose:'',bg:''};

const T = {
  ru:{drag:"Перетащи одежду на место",correct:"Верно!",wrong:"Неверно, попробуй ещё",submit:"Ответить",win:"ПОБЕДА! Персонаж одет верно!",lose:"Попробуй ещё раз",restart:"Играть заново",place:"Место"},
  en:{drag:"Drag clothes to the right spot",correct:"Correct!",wrong:"Wrong, try again",submit:"Submit",win:"WIN! Character dressed correctly!",lose:"Try again",restart:"Play again",place:"Spot"},
  uk:{drag:"Перетягни одяг на місце",correct:"Правильно!",wrong:"Неправильно, спробуй ще",submit:"Відповісти",win:"ПЕРЕМОГА!",lose:"Спробуй ще",restart:"Грати знову",place:"Місце"},
  de:{drag:"Ziehe die Kleidung an ihren Platz",correct:"Richtig!",wrong:"Falsch, versuche es erneut",submit:"Antworten",win:"SIEG!",lose:"Nochmal",restart:"Nochmal spielen",place:"Platz"},
  fr:{drag:"Glissez les vêtements au bon endroit",correct:"Correct!",wrong:"Faux, réessayez",submit:"Répondre",win:"VICTOIRE!",lose:"Réessayer",restart:"Rejouer",place:"Zone"}
};

/* ============= СЖАТИЕ КАРТИНОК ============= */
function loadImg(input,key){
  const file=input.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const canvas=document.createElement('canvas');
      let w=img.width,h=img.height, max=600;
      if(w>max){h=h*max/w;w=max;}
      if(h>max){w=w*max/h;h=max;}
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      const data=canvas.toDataURL('image/webp',0.7);
      images[key]=data;
      document.getElementById('thumb_'+key).src=data;
      render();
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

/* ============= КАРТИНКА ДЛЯ ЭЛЕМЕНТА ОДЕЖДЫ ============= */
function loadClothImg(input,id,field){
  const file=input.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const canvas=document.createElement('canvas');
      let w=img.width,h=img.height,max=300;
      if(w>max){h=h*max/w;w=max;}
      if(h>max){w=w*max/h;h=max;}
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      const c=clothes.find(x=>x.id===id);
      c[field]=canvas.toDataURL('image/webp',0.7);
      render();
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

/* ============= ДОБАВИТЬ ОДЕЖДУ ============= */
function addCloth(){
  const id=Date.now()+Math.floor(Math.random()*1000);
  clothes.push({id,name:'Элемент',img:'',zoneX:40,zoneY:20,zoneW:20,zoneH:20,
    taskType:'choice',question:'Вопрос?',answers:['Ответ 1','Ответ 2'],correct:0,taskImg:''});
  drawClothList();render();
}
function delCloth(id){clothes=clothes.filter(c=>c.id!==id);drawClothList();render();}

function drawClothList(){
  const box=document.getElementById('clothList');box.innerHTML='';
  clothes.forEach((c,i)=>{
    const d=document.createElement('div');d.className='clothItem';
    d.innerHTML=`
      <div class="row"><b>#${i+1}</b><button style="margin:0;background:#c0392b;box-shadow:none" onclick="delCloth(${c.id})">✕</button></div>
      <label>Название</label><input value="${c.name}" oninput="upd(${c.id},'name',this.value)">
      <label>Картинка элемента одежды</label>
      <input type="file" accept="image/*" onchange="loadClothImg(this,${c.id},'img')">
      ${c.img?`<img src="${c.img}" class="thumb">`:''}
      <small>Позиция зоны (% от размера): X, Y, ширина, высота</small>
      <div class="row">
        <input type="number" value="${c.zoneX}" oninput="upd(${c.id},'zoneX',+this.value)" title="X">
        <input type="number" value="${c.zoneY}" oninput="upd(${c.id},'zoneY',+this.value)" title="Y">
        <input type="number" value="${c.zoneW}" oninput="upd(${c.id},'zoneW',+this.value)" title="W">
        <input type="number" value="${c.zoneH}" oninput="upd(${c.id},'zoneH',+this.value)" title="H">
      </div>
      <label>Тип задания</label>
      <select onchange="upd(${c.id},'taskType',this.value)">
        <option value="choice" ${c.taskType=='choice'?'selected':''}>Выбор ответа</option>
        <option value="input" ${c.taskType=='input'?'selected':''}>Ввод ответа</option>
        <option value="imginput" ${c.taskType=='imginput'?'selected':''}>Картинка + ввод ответа</option>
      </select>
      <label>Вопрос</label><textarea oninput="upd(${c.id},'question',this.value)">${c.question}</textarea>
      ${c.taskType=='imginput'?`<label>Картинка к заданию</label>
        <input type="file" accept="image/*" onchange="loadClothImg(this,${c.id},'taskImg')">
        ${c.taskImg?`<img src="${c.taskImg}" class="thumb">`:''}`:''}
      ${c.taskType=='choice'?renderAnswers(c):
        `<label>Правильный ответ (текст)</label><input value="${c.answers[0]||''}" oninput="updAns(${c.id},0,this.value)">`}
    `;
    box.appendChild(d);
  });
}
function renderAnswers(c){
  let h='<label>Варианты (выбери правильный)</label>';
  c.answers.forEach((a,i)=>{
    h+=`<div class="row" style="align-items:center">
      <input type="radio" style="width:auto" ${c.correct==i?'checked':''} onclick="upd(${c.id},'correct',${i})">
      <input value="${a}" oninput="updAns(${c.id},${i},this.value)">
    </div>`;
  });
  h+=`<button style="font-size:11px;padding:4px" onclick="addAns(${c.id})">+ вариант</button>`;
  return h;
}
function upd(id,f,v){clothes.find(c=>c.id===id)[f]=v;drawClothList();render();}
function updAns(id,i,v){clothes.find(c=>c.id===id).answers[i]=v;render();}
function addAns(id){clothes.find(c=>c.id===id).answers.push('Ответ');drawClothList();render();}

/* ============= ГЕНЕРАЦИЯ КОДА ИГРЫ ============= */
function buildGameHTML(){
  const g={
    title:document.getElementById('gameTitle').value,
    lang:document.getElementById('lang').value,
    cBg:document.getElementById('c_bg').value,
    cModal:document.getElementById('c_modal').value,
    cAns:document.getElementById('c_ans').value,
    cGlow:document.getElementById('c_glow').value,
    cCyan:document.getElementById('c_cyan').value,
    cPurple:document.getElementById('c_purple').value,
    font:document.getElementById('font').value,
    fontSize:document.getElementById('fontSize').value
  };
  const data=JSON.stringify({g,images,clothes});
  return `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
*{box-sizing:border-box;}
body{margin:0;font-family:${g.font};font-size:${g.fontSize}px;overflow:hidden;}
#stage{position:relative;width:100vw;height:100vh;background:${g.cBg};background-size:cover;background-position:center;}
#char{position:absolute;top:0;left:50%;transform:translateX(-50%);height:100%;filter:drop-shadow(0 0 15px ${g.cGlow});}
.zone{position:absolute;border:2px dashed ${g.cCyan};border-radius:8px;box-shadow:0 0 10px ${g.cCyan};display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;pointer-events:none;}
.zone.filled{border-color:${g.cPurple};}
.cloth{position:absolute;cursor:grab;touch-action:none;filter:drop-shadow(0 0 8px ${g.cGlow});transition:box-shadow .2s;}
#tray{position:absolute;bottom:0;left:0;right:0;display:flex;gap:12px;flex-wrap:wrap;justify-content:center;padding:10px;background:rgba(0,0,0,.4);min-height:80px;align-items:center;}
#tray img{height:60px;cursor:grab;filter:drop-shadow(0 0 8px ${g.cGlow});}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.8);display:none;align-items:center;justify-content:center;z-index:100;}
.box{background:${g.cModal};border:1px solid ${g.cCyan};border-radius:14px;padding:26px;max-width:82%;text-align:center;color:#fff;box-shadow:0 0 30px ${g.cGlow};}
.box img{max-width:100%;max-height:220px;border-radius:8px;margin-bottom:10px;}
.ans{display:block;width:100%;margin:6px 0;padding:10px;border:none;border-radius:8px;background:${g.cAns};color:#fff;cursor:pointer;font-family:${g.font};box-shadow:0 0 8px ${g.cGlow};}
.ans:hover{filter:brightness(1.25);}
input.txt{padding:10px;border-radius:8px;border:1px solid ${g.cCyan};background:rgba(0,0,0,.4);color:#fff;width:80%;font-family:${g.font};}
.btn{margin-top:12px;padding:10px 20px;border:none;border-radius:8px;background:linear-gradient(90deg,${g.cPurple},${g.cCyan});color:#fff;cursor:pointer;font-weight:bold;box-shadow:0 0 12px ${g.cGlow};font-family:${g.font};}
h2{color:${g.cCyan};text-shadow:0 0 8px ${g.cCyan};letter-spacing:2px;}
#title{position:absolute;top:8px;width:100%;text-align:center;color:#fff;text-shadow:0 0 10px ${g.cGlow};letter-spacing:3px;font-size:1.4em;z-index:5;}
.msg{margin-top:8px;font-weight:bold;}
</style></head><body>
<div id="stage"><div id="title">${g.title}</div></div>
<div class="modal" id="taskModal"><div class="box" id="taskBox"></div></div>
<div class="modal" id="endModal"><div class="box" id="endBox"></div></div>
<script>
var DATA=${data};
var T=${JSON.stringify(T)};
var lang=DATA.g.lang, tr=T[lang];
var stage=document.getElementById('stage');
var solved={}; // id -> true, зона доступна для сброса
var currentCloth=null;

function initGame(){
  stage.style.background=DATA.images.bg?('url('+DATA.images.bg+') center/cover':'')+DATA.g.cBg;
  stage.innerHTML='<div id="title">'+DATA.g.title+'</div>';
  solved={};
  // персонаж
  if(DATA.images.character){var ch=document.createElement('img');ch.id='char';ch.src=DATA.images.character;stage.appendChild(ch);}
  // зоны
  DATA.clothes  // зоны (пунктирные линии)
  DATA.clothes.forEach(function(c){
    var z=document.createElement('div');
    z.className='zone';z.id='zone_'+c.id;
    z.style.left=c.zoneX+'%';z.style.top=c.zoneY+'%';
    z.style.width=c.zoneW+'%';z.style.height=c.zoneH+'%';
    z.textContent=tr.place;
    stage.appendChild(z);
  });
  // трей с одеждой (перемешан)
  var tray=document.createElement('div');tray.id='tray';
  var shuffled=DATA.clothes.slice().sort(function(){return Math.random()-0.5;});
  shuffled.forEach(function(c){
    if(!c.img)return;
    var im=document.createElement('img');
    im.src=c.img;im.dataset.id=c.id;
    makeDraggable(im,c);
    tray.appendChild(im);
  });
  stage.appendChild(tray);
  // добавляем кнопку рестарта
  var rb=document.createElement('button');
  rb.className='btn';rb.textContent=tr.restart;
  rb.style.position='absolute';rb.style.top='10px';rb.style.right='10px';rb.style.zIndex=6;
  rb.onclick=initGame;
  stage.appendChild(rb);
}

/* ==== ПЕРЕТАСКИВАНИЕ ==== */
function makeDraggable(el,cloth){
  var offX,offY,moving=false;
  function start(x,y){
    // при взятии одежды — показать задание (только если ещё не решено)
    if(!solved[cloth.id]){
      showTask(cloth);
      return;
    }
    moving=true;el.style.cursor='grabbing';
    var r=el.getBoundingClientRect();
    offX=x-r.left;offY=y-r.top;
    el.style.position='fixed';el.style.zIndex=200;
    move(x,y);
  }
  function move(x,y){
    if(!moving)return;
    el.style.left=(x-offX)+'px';
    el.style.top=(y-offY)+'px';
  }
  function end(x,y){
    if(!moving)return;moving=false;el.style.cursor='grab';
    // проверяем попадание в свою зону
    var zone=document.getElementById('zone_'+cloth.id);
    var zr=zone.getBoundingClientRect();
    if(x>=zr.left&&x<=zr.right&&y>=zr.top&&y<=zr.bottom){
      // разместить точно в зоне
      el.style.left=zr.left+'px';
      el.style.top=zr.top+'px';
      el.style.width=zr.width+'px';
      el.style.height=zr.height+'px';
      el.style.objectFit='contain';
      zone.classList.add('filled');
      zone.dataset.done='1';
      el.dataset.placed='1';
      el.onmousedown=null;el.ontouchstart=null; // зафиксировать
      checkWin();
    }else{
      // вернуть в трей
      el.style.position='static';el.style.zIndex='';
      el.style.left='';el.style.top='';el.style.width='';el.style.height='';
      document.getElementById('tray').appendChild(el);
    }
  }
  el.onmousedown=function(e){e.preventDefault();start(e.clientX,e.clientY);};
  document.addEventListener('mousemove',function(e){move(e.clientX,e.clientY);});
  document.addEventListener('mouseup',function(e){end(e.clientX,e.clientY);});
  el.ontouchstart=function(e){var t=e.touches[0];start(t.clientX,t.clientY);};
  document.addEventListener('touchmove',function(e){if(moving){e.preventDefault();var t=e.touches[0];move(t.clientX,t.clientY);}},{passive:false});
  document.addEventListener('touchend',function(e){var t=e.changedTouches[0];end(t.clientX,t.clientY);});
}

/* ==== ОКНО ЗАДАНИЯ ==== */
function showTask(cloth){
  currentCloth=cloth;
  var box=document.getElementById('taskBox');
  var html='<h2>'+cloth.name+'</h2>';
  if(cloth.taskType==='imginput'&&cloth.taskImg){
    html+='<img src="'+cloth.taskImg+'">';
  }
  html+='<p>'+cloth.question+'</p>';
  if(cloth.taskType==='choice'){
    cloth.answers.forEach(function(a,i){
      html+='<button class="ans" onclick="answerChoice('+i+')">'+a+'</button>';
    });
  }else{
    html+='<input class="txt" id="txtAns" placeholder="..."><br>';
    html+='<button class="btn" onclick="answerInput()">'+tr.submit+'</button>';
  }
  html+='<div class="msg" id="taskMsg"></div>';
  box.innerHTML=html;
  document.getElementById('taskModal').style.display='flex';
}
function answerChoice(i){
  var c=currentCloth;
  if(i===c.correct){taskSuccess();}
  else{document.getElementById('taskMsg').textContent=tr.wrong;document.getElementById('taskMsg').style.color='#ff6b6b';}
}
function answerInput(){
  var c=currentCloth;
  var val=document.getElementById('txtAns').value.trim().toLowerCase();
  var right=(c.answers[0]||'').trim().toLowerCase();
  if(val===right){taskSuccess();}
  else{document.getElementById('taskMsg').textContent=tr.wrong;document.getElementById('taskMsg').style.color='#ff6b6b';}
}
function taskSuccess(){
  var msg=document.getElementById('taskMsg');
  msg.textContent=tr.correct;msg.style.color='#2ecc71';
  solved[currentCloth.id]=true;
  setTimeout(function(){
    document.getElementById('taskModal').style.display='none';
  },700);
}

/* ==== ПРОВЕРКА ПОБЕДЫ ==== */
function checkWin(){
  var allDone=DATA.clothes.every(function(c){
    if(!c.img)return true;
    var z=document.getElementById('zone_'+c.id);
    return z&&z.dataset.done==='1';
  });
  if(allDone){ showEnd(true); }
}

/* ==== ОКНО ПОБЕДЫ / ПОРАЖЕНИЯ ==== */
function showEnd(win){
  var box=document.getElementById('endBox');
  var img=win?DATA.images.win:DATA.images.lose;
  var text=win?tr.win:tr.lose;
  var html='';
  if(img){html+='<img src="'+img+'">';}
  html+='<h2>'+text+'</h2>';
  html+='<button class="btn" onclick="restart()">'+tr.restart+'</button>';
  box.innerHTML=html;
  document.getElementById('endModal').style.display='flex';
}
function restart(){
  document.getElementById('endModal').style.display='none';
  initGame();
}

initGame();

/* ===================== РЕНДЕР ПРЕДПРОСМОТРА (без мерцания) ===================== */
let renderTimer=null;
function render(){
  // применяем стиль к самому редактору
  document.documentElement.style.setProperty('--bg',document.getElementById('c_bg').value);
  document.documentElement.style.setProperty('--cyan',document.getElementById('c_cyan').value);
  document.documentElement.style.setProperty('--purple',document.getElementById('c_purple').value);
  document.documentElement.style.setProperty('--glow',document.getElementById('c_glow').value);
  document.documentElement.style.setProperty('--font',document.getElementById('font').value);

  // debounce, чтобы не перерисовывать iframe слишком часто
  clearTimeout(renderTimer);
  renderTimer=setTimeout(updatePreview,150);
}
function updatePreview(){
  const frame=document.getElementById('previewFrame');
  const html=buildGameHTML();
  // используем srcdoc — обновление без "белой вспышки"
  const doc=frame.contentWindow.document;
  doc.open();doc.write(html);doc.close();
}

/* ===================== ТЕСТ-ДРАЙВ ===================== */
function openTest(){
  const html=buildGameHTML();
  const w=window.open('','_blank');
  w.document.open();w.document.write(html);w.document.close();
}

/* ===================== КОПИРОВАНИЕ КОДА ===================== */
function copyCode(){
  const code=buildGameHTML();
  navigator.clipboard.writeText(code).then(function(){
    const btn=document.getElementById('copyBtn');
    btn.textContent='✔ Скопировано';
    btn.classList.add('copied');
    setTimeout(function(){
      btn.textContent='📋 Скопировать код';
      btn.classList.remove('copied');
    },2000);
  }).catch(function(){
    // запасной способ
    const ta=document.createElement('textarea');
    ta.value=code;document.body.appendChild(ta);ta.select();
    document.execCommand('copy');ta.remove();
    const btn=document.getElementById('copyBtn');
    btn.textContent='✔ Скопировано';btn.classList.add('copied');
    setTimeout(function(){btn.textContent='📋 Скопировать код';btn.classList.remove('copied');},2000);
  });
}

addCloth();  // один элемент по умолчанию
render();

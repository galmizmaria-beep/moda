<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Builder - Образовательная игра</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rajdhani:wght@500;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #090514;
            --bg-panel: #140d2b;
            --bg-panel-light: #1e1440;
            --primary: #a626ff;
            --primary-glow: rgba(166, 38, 255, 0.5);
            --secondary: #00f0ff;
            --text-main: #ffffff;
            --text-muted: #8e87a5;
            --font-headers: 'Orbitron', sans-serif;
            --font-text: 'Rajdhani', sans-serif;
            --btn-gradient: linear-gradient(90deg, #8a2be2 0%, #d845ff 100%);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: var(--font-text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 0%, #1e0b3b 0%, transparent 50%);
        }

        /* Header */
        header {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .logo { font-family: var(--font-headers); font-size: 24px; font-weight: 700; letter-spacing: 2px; display: flex; align-items: center; gap: 10px; }
        .logo span { color: var(--primary); }

        /* Main Workspace */
        .workspace {
            display: flex;
            flex: 1;
            padding: 20px;
            gap: 20px;
            height: calc(100vh - 120px);
        }

        /* Sidebar - Settings */
        .sidebar {
            width: 400px;
            background: var(--bg-panel);
            border-radius: 20px;
            padding: 20px;
            overflow-y: auto;
            border: 1px solid rgba(166, 38, 255, 0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .sidebar::-webkit-scrollbar { width: 8px; }
        .sidebar::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 4px; }

        .section-title { font-family: var(--font-headers); font-size: 16px; margin-bottom: 15px; color: var(--secondary); text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid rgba(0, 240, 255, 0.2); padding-bottom: 5px; }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 14px; color: var(--text-muted); }
        .form-group input[type="text"], .form-group select {
            width: 100%; padding: 10px; background: var(--bg-panel-light); border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 8px; font-family: var(--font-text); outline: none; transition: 0.3s;
        }
        .form-group input[type="text"]:focus { border-color: var(--primary); box-shadow: 0 0 10px var(--primary-glow); }
        .form-group input[type="color"] { width: 100%; height: 40px; border: none; border-radius: 8px; background: transparent; cursor: pointer; }
        
        .file-upload { position: relative; overflow: hidden; display: inline-block; width: 100%; }
        .file-upload input[type="file"] { position: absolute; left: 0; top: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer; }
        .file-upload-btn { display: block; width: 100%; padding: 10px; text-align: center; background: rgba(255,255,255,0.05); border: 1px dashed var(--primary); border-radius: 8px; color: var(--primary); transition: 0.3s; }
        .file-upload:hover .file-upload-btn { background: rgba(166, 38, 255, 0.1); }

        /* Preview Area */
        .preview-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-panel);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
            position: relative;
        }

        .preview-header { padding: 15px 20px; background: rgba(0,0,0,0.2); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        
        .btn { padding: 10px 20px; border: none; border-radius: 30px; font-family: var(--font-headers); font-weight: 700; font-size: 14px; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .btn-glow { background: var(--btn-gradient); color: white; box-shadow: 0 0 15px var(--primary-glow); }
        .btn-glow:hover { box-shadow: 0 0 25px var(--primary); transform: translateY(-2px); }
        .btn-outline { background: transparent; border: 2px solid var(--secondary); color: var(--secondary); box-shadow: 0 0 10px rgba(0, 240, 255, 0.3); }
        .btn-outline:hover { background: var(--secondary); color: var(--bg-main); }

        .iframe-container { flex: 1; padding: 20px; display: flex; justify-content: center; align-items: center; background: #000; }
        #game-preview { width: 100%; max-width: 800px; height: 100%; max-height: 600px; border: 2px solid rgba(255,255,255,0.1); border-radius: 10px; background: #222; }

        /* Footer */
        footer { text-align: center; padding: 15px; font-size: 12px; color: rgba(255,255,255,0.3); letter-spacing: 1px; }

        /* Added item block */
        .item-block { background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; margin-bottom: 10px; border-left: 3px solid var(--secondary); }
    </style>
</head>
<body>

    <header>
        <div class="logo">EDU<span>GAME</span>BUILDER</div>
        <div>
            <button class="btn btn-outline" onclick="testDrive()">Тест-драйв</button>
            <button class="btn btn-glow" id="copyBtn" onclick="generateAndCopyCode()">Скопировать код</button>
        </div>
    </header>

    <div class="workspace">
        <!-- Настройки (Левая панель) -->
        <div class="sidebar">
            <div class="section-title">Дизайн игры</div>
            <div style="display: flex; gap: 10px;">
                <div class="form-group" style="flex: 1;">
                    <label>Цвет фона</label>
                    <input type="color" id="col-bg" value="#0a0518" onchange="updatePreview()">
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>Цвет кнопок</label>
                    <input type="color" id="col-btn" value="#9b2cff" onchange="updatePreview()">
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>Цвет свечения</label>
                    <input type="color" id="col-glow" value="#00f0ff" onchange="updatePreview()">
                </div>
            </div>

            <div class="section-title">Изображения</div>
            <div class="form-group">
                <label>Фон игры (опционально)</label>
                <div class="file-upload">
                    <span class="file-upload-btn" id="lbl-bg">Загрузить фон</span>
                    <input type="file" accept="image/*" onchange="handleImageUpload(this, 'img-bg', 'lbl-bg')">
                </div>
            </div>
            <div class="form-group">
                <label>Персонаж (в одежде - База)</label>
                <div class="file-upload">
                    <span class="file-upload-btn" id="lbl-char">Загрузить персонажа</span>
                    <input type="file" accept="image/*" onchange="handleImageUpload(this, 'img-char', 'lbl-char')">
                </div>
            </div>
            <div class="form-group">
                <label>Картинка Победы</label>
                <div class="file-upload">
                    <span class="file-upload-btn" id="lbl-win">Загрузить победу</span>
                    <input type="file" accept="image/*" onchange="handleImageUpload(this, 'img-win', 'lbl-win')">
                </div>
            </div>

            <div class="section-title">Элементы одежды и задания</div>
            <div id="items-container">
                <!-- Сюда добавляются вещи -->
            </div>
            <button class="btn btn-outline" style="width: 100%; margin-top: 10px; font-size: 12px;" onclick="addClothingItem()">+ Добавить элемент одежды</button>
        </div>

        <!-- Предпросмотр (Правая панель) -->
        <div class="preview-area">
            <div class="preview-header">
                <span style="font-family: var(--font-headers); color: var(--secondary);">Live Preview</span>
            </div>
            <div class="iframe-container">
                <!-- Окно где будет крутиться игра -->
                <iframe id="game-preview" srcdoc="<h2 style='color:white; text-align:center; font-family:sans-serif; margin-top: 20%;'>Загрузите изображения и добавьте элементы в левой панели для отображения игры.</h2>"></iframe>
            </div>
        </div>
    </div>

    <footer>
        Все права защищены и принадлежат Гальмиз Марии Александровне
    </footer>

    <script>
        // Хранилище данных игры
        let gameData = {
            images: {
                'img-bg': '',
                'img-char': '',
                'img-win': ''
            },
            items: []
        };

        // Функция сжатия изображений (чтобы код iframe не был огромным)
        function handleImageUpload(input, key, labelId) {
            const file = input.files[0];
            if (!file) return;

            document.getElementById(labelId).innerText = "Загрузка...";

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    
                    // Максимальная ширина для сжатия
                    const MAX_WIDTH = 600;
                    let width = img.width;
                    let height = img.height;

                    if (width > MAX_WIDTH) {
                        height *= MAX_WIDTH / width;
                        width = MAX_WIDTH;
                    }

                    canvas.width = width;
                    canvas.height = height;
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    // Конвертируем в компактный WebP (Качество 0.7)
                    gameData.images[key] = canvas.toDataURL('image/webp', 0.7);
                    document.getElementById(labelId).innerText = "Загружено ✓";
                    document.getElementById(labelId).style.borderColor = "#00f0ff";
                    document.getElementById(labelId).style.color = "#00f0ff";
                    updatePreview();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function handleItemImage(input, index) {
             const file = input.files[0];
            if (!file) return;
            const label = input.previousElementSibling;
            label.innerText = "Сжатие...";

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width > 300 ? 300 : img.width;
                    canvas.height = img.height * (canvas.width / img.width);
                    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                    
                    gameData.items[index].img = canvas.toDataURL('image/webp', 0.7);
                    label.innerText = "Загружено ✓";
                    label.style.color = "#00f0ff";
                    updatePreview();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        // Управление элементами одежды
        function addClothingItem() {
            const index = gameData.items.length;
            gameData.items.push({
                img: '',
                taskType: 'text',
                question: 'Как называется этот элемент?',
                answer: ''
            });
            renderItems();
        }

        function updateItem(index, field, value) {
            gameData.items[index][field] = value;
            updatePreview();
        }

        function renderItems() {
            const container = document.getElementById('items-container');
            container.innerHTML = '';
            gameData.items.forEach((item, index) => {
                container.innerHTML += `
                    <div class="item-block">
                        <div style="font-weight:bold; color:var(--primary); margin-bottom: 5px;">Элемент ${index + 1}</div>
                        
                        <div class="file-upload" style="margin-bottom: 10px;">
                            <span class="file-upload-btn" style="padding: 5px; font-size: 12px;">Картинка одежды (png без фона)</span>
                            <input type="file" accept="image/png, image/webp" onchange="handleItemImage(this, ${index})">
                        </div>

                        <div class="form-group" style="margin-bottom: 5px;">
                            <select onchange="updateItem(${index}, 'taskType', this.value)" style="padding: 5px; font-size:12px;">
                                <option value="text" ${item.taskType === 'text' ? 'selected' : ''}>Ввод ответа текстом</option>
                                <option value="choice" ${item.taskType === 'choice' ? 'selected' : ''}>Выбор из вариантов</option>
                            </select>
                        </div>
                        <div class="form-group" style="margin-bottom: 5px;">
                            <input type="text" placeholder="Вопрос" value="${item.question}" onkeyup="updateItem(${index}, 'question', this.value)" style="padding: 5px; font-size:12px;">
                        </div>
                        <div class="form-group" style="margin-bottom: 0;">
                            <input type="text" placeholder="Правильный ответ (или варианты через запятую)" value="${item.answer}" onkeyup="updateItem(${index}, 'answer', this.value)" style="padding: 5px; font-size:12px;">
                        </div>
                    </div>
                `;
            });
        }

        // Генерация движка игры (HTML String)
        function generateGameHTML() {
            const bgHex = document.getElementById('col-bg').value;
            const btnHex = document.getElementById('col-btn').value;
            const glowHex = document.getElementById('col-glow').value;
            
            // Заглушка, если база не загружена
            if(!gameData.images['img-char']) {
                return `<div style="color:white;text-align:center;font-family:sans-serif;margin-top:20%;">Сначала загрузите изображение персонажа в настройках.</div>`;
            }

            // Формируем HTML для элементов
            let itemsHtml = '';
            let jsItemsData = [];
            gameData.items.forEach((item, i) => {
                if(item.img) {
                    itemsHtml += `<img src="${item.img}" class="draggable-item" id="item-${i}" data-id="${i}" style="left: ${10 + (i*15)}%; top: 80%;">`;
                    jsItemsData.push({ id: i, taskType: item.taskType, question: item.question, answer: item.answer });
                }
            });

            // Сам код игры (HTML + CSS + JS в одном флаконе)
            return `
            <!DOCTYPE html>
            <html>
            <head>
                <style>
                    body { 
                        margin: 0; padding: 0; 
                        background-color: ${bgHex}; 
                        background-image: url('${gameData.images['img-bg']}');
                        background-size: cover; background-position: center;
                        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                        overflow: hidden; user-select: none;
                    }
                    .game-container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
                    .character { height: 70%; max-height: 800px; object-fit: contain; pointer-events: none; z-index: 1; opacity: 0.5; /* Полупрозрачная подсказка */ }
                    
                    /* Пунктирные линии для мест */
                    .drop-zone-overlay {
                        position: absolute; width: 100%; height: 100%; top:0; left:0; z-index: 2; pointer-events: none;
                    }

                    .draggable-item { 
                        position: absolute; width: 100px; cursor: grab; z-index: 10;
                        filter: drop-shadow(0 0 10px ${glowHex});
                        transition: transform 0.2s;
                    }
                    .draggable-item:active { cursor: grabbing; transform: scale(1.1); }
                    
                    /* Модальное окно задания */
                    .modal { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); border: 2px solid ${btnHex}; box-shadow: 0 0 30px ${glowHex}; padding: 30px; border-radius: 20px; z-index: 100; text-align: center; color: white; width: 80%; max-width: 400px; }
                    .modal h3 { margin-top: 0; color: ${glowHex}; }
                    .modal input { width: 90%; padding: 10px; margin: 10px 0; border-radius: 10px; border: 1px solid ${btnHex}; background: #222; color: white; text-align: center; }
                    .btn { background: ${btnHex}; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; box-shadow: 0 0 10px ${glowHex}; font-weight: bold; margin-top:10px; }
                    
                    /* Победа */
                    .win-screen { display: none; position: absolute; top:0; left:0; width: 100%; height: 100%; background: ${bgHex}; z-index: 200; flex-direction: column; justify-content: center; align-items: center; }
                    .win-screen img { max-height: 50%; margin-bottom: 20px; }
                    .win-screen h1 { color: ${glowHex}; text-shadow: 0 0 20px ${btnHex}; }
                </style>
            </head>
            <body>
                <div class="game-container" id="gameArea">
                    <img src="${gameData.images['img-char']}" class="character" id="mainChar">
                    ${itemsHtml}
                </div>

                <div class="modal" id="taskModal">
                    <h3 id="taskQuestion">Задание</h3>
                    <div id="taskInputArea"></div>
                    <button class="btn" onclick="checkAnswer()">Ответить</button>
                    <p id="errorMsg" style="color:#ff4444; font-size: 12px; display:none;">Неверно, попробуй еще!</p>
                </div>

                <div class="win-screen" id="winScreen">
                    ${gameData.images['img-win'] ? `<img src="${gameData.images['img-win']}">` : ''}
                    <h1>ОТЛИЧНАЯ РАБОТА!</h1>
                    <button class="btn" onclick="location.reload()">ПЕРЕЗАПУСТИТЬ ИГРУ</button>
                </div>

                <script>
                    const itemsData = ${JSON.stringify(jsItemsData)};
                    let currentDrag = null;
                    let currentTaskItem = null;
                    let itemsPlaced = 0;

                    // Простая логика Drag & Drop
                    document.querySelectorAll('.draggable-item').forEach(item => {
                        item.addEventListener('pointerdown', (e) => {
                            currentDrag = item;
                            item.style.zIndex = 1000;
                        });
                    });

                    document.addEventListener('pointermove', (e) => {
                        if (!currentDrag) return;
                        currentDrag.style.left = (e.clientX - currentDrag.offsetWidth / 2) + 'px';
                        currentDrag.style.top = (e.clientY - currentDrag.offsetHeight / 2) + 'px';
                    });

                    document.addEventListener('pointerup', (e) => {
                        if (!currentDrag) return;
                        
                        // Имитация "Попадания на персонажа" (упрощенная коллизия по центру экрана)
                        const charRect = document.getElementById('mainChar').getBoundingClientRect();
                        const itemRect = currentDrag.getBoundingClientRect();
                        
                        // Если бросили примерно в область персонажа
                        if(itemRect.left > charRect.left - 50 && itemRect.right < charRect.right + 50 && 
                           itemRect.top > charRect.top - 50 && itemRect.bottom < charRect.bottom + 50) {
                            
                            showTask(currentDrag);
                        } else {
                            currentDrag.style.zIndex = 10;
                            currentDrag = null;
                        }
                    });

                    function showTask(itemElement) {
                        const id = itemElement.getAttribute('data-id');
                        currentTaskItem = { el: itemElement, data: itemsData.find(i => i.id == id) };
                        
                        document.getElementById('taskQuestion').innerText = currentTaskItem.data.question;
                        const inputArea = document.getElementById('taskInputArea');
                        
                        if(currentTaskItem.data.taskType === 'text') {
                            inputArea.innerHTML = '<input type="text" id="answerInput" placeholder="Введите ответ">';
                        } else {
                            // Логика мультивыбора на основе запятых
                            const variants = currentTaskItem.data.answer.split(',').map(s=>s.trim());
                            let btns = '';
                            variants.forEach(v => {
                                btns += \`<button class="btn" style="display:block; width:100%; margin-bottom:5px; background:#444;" onclick="document.getElementById('answerInput').value='\`+v+\`'">\`+v+\`</button>\`;
                            });
                            inputArea.innerHTML = btns + '<input type="hidden" id="answerInput" value="">';
                        }

                        document.getElementById('taskModal').style.display = 'block';
                        document.getElementById('errorMsg').style.display = 'none';
                        currentDrag = null; // Отпускаем мышь
                    }

                    function checkAnswer() {
                        const input = document.getElementById('answerInput').value.trim().toLowerCase();
                        // Берем первый правильный ответ до запятой
                        const correct = currentTaskItem.data.answer.split(',')[0].trim().toLowerCase();
                        
                        if(input === correct) {
                            document.getElementById('taskModal').style.display = 'none';
                            // Фиксируем элемент (в реальной игре тут нужны точные координаты, в демо ставим по центру)
                            currentTaskItem.el.style.pointerEvents = 'none';
                            currentTaskItem.el.style.filter = 'drop-shadow(0 0 20px #00ff00)';
                            itemsPlaced++;
                            
                            if(itemsPlaced >= itemsData.length) {
                                setTimeout(() => {
                                    document.getElementById('winScreen').style.display = 'flex';
                                }, 500);
                            }
                        } else {
                            document.getElementById('errorMsg').style.display = 'block';
                            // Возвращаем вещь на старт если неверно
                            currentTaskItem.el.style.top = '80%';
                            currentTaskItem.el.style.left = '10%';
                            setTimeout(() => { document.getElementById('taskModal').style.display = 'none'; }, 1000);
                        }
                    }
                <\/script>
            </body>
            </html>`;
        }

        function updatePreview() {
            const iframe = document.getElementById('game-preview');
            iframe.srcdoc = generateGameHTML();
        }

        function testDrive() {
            const w = window.open();
            w.document.write(generateGameHTML());
        }

        function generateAndCopyCode() {
            const htmlString = generateGameHTML();
            
            // Превращаем HTML в Data URI (Base64) для обхода ограничений Genially
            const encodedHtml = btoa(unescape(encodeURIComponent(htmlString)));
            const dataUri = `data:text/html;base64,${encodedHtml}`;
            
            // Создаем iframe код
            const iframeCode = `<iframe src="${dataUri}" width="100%" height="600px" style="border:none; border-radius:15px;" allowfullscreen></iframe>`;
            
            // Копируем в буфер обмена
            navigator.clipboard.writeText(iframeCode).then(() => {
                const btn = document.getElementById('copyBtn');
                const originalText = btn.innerText;
                btn.innerText = "СКОПИРОВАНО ✓";
                btn.style.background = "#00f0ff";
                btn.style.color = "#000";
                
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.style.background = "var(--btn-gradient)";
                    btn.style.color = "white";
                }, 3000);
            }).catch(err => {
                alert('Ошибка копирования: ' + err);
            });
        }

        // Инициализация
        updatePreview();
    </script>
</body>
</html>
